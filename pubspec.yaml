name: teacher_notebook
description: "دفتر المدرس - Teacher Notebook application for managing groups, students, attendance, and payments."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.3
  path: ^1.8.3
  provider: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.0.0
  pdf: ^3.10.0
  printing: ^5.11.0
  permission_handler: ^11.4.4
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Harmattan
      fonts:
        - asset: assets/fonts/Harmattan-Bold.ttf
          weight: 700
        - asset: assets/fonts/Harmattan-Regular.ttf
          weight: 400
        - asset: assets/fonts/Harmattan-SemiBold.ttf
          weight: 600

  generate: true